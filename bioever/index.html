<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bioever - Dashboard Suite Impulso</title>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <!-- Dependencies -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide-react@0.344.0/dist/umd/lucide-react.min.js"></script>
    <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>

    <style>
        :root {
            --primary: #059669;
            /* Verde Bioever */
            --primary-light: #ecfdf5;
            --primary-dark: #047857;
            --secondary: #64748b;
            --accent: #10b981;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --pending: #94a3b8;
            --bg-main: #f8fafc;
            --bg-card: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --text-light: #94a3b8;
            --border-color: #e2e8f0;
            --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
            --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
            --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.1), 0 4px 6px -4px rgb(0 0 0 / 0.1);
            --radius-sm: 0.375rem;
            --radius-md: 0.5rem;
            --radius-lg: 0.75rem;
            --radius-xl: 1rem;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-main);
            color: var(--text-main);
            line-height: 1.5;
        }

        h1,
        h2,
        h3,
        h4 {
            font-family: 'Outfit', sans-serif;
            font-weight: 600;
        }

        .dashboard-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem 1rem;
            display: flex;
            flex-direction: column;
            gap: 2rem;
            min-height: 400px;
        }

        .section-card {
            background: var(--bg-card);
            border-radius: var(--radius-lg);
            border: 1px solid var(--border-color);
            box-shadow: var(--shadow-sm);
            overflow: hidden;
            margin-bottom: 2rem;
        }

        .section-header {
            padding: 1.25rem 1.5rem;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: space-between;
            cursor: pointer;
            background: #fff;
        }

        .section-content {
            padding: 1.5rem;
        }

        .glass {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        button {
            cursor: pointer;
            border: none;
            background: none;
            font-family: inherit;
        }

        @keyframes spin {
            from {
                transform: rotate(0deg);
            }

            to {
                transform: rotate(360deg);
            }
        }

        .animate-spin {
            animation: spin 2s linear infinite;
        }

        #suite-impulso-root:empty::before {
            content: "Cargando Dashboard Bioever...";
            display: block;
            padding: 3rem;
            text-align: center;
            color: var(--text-muted);
            font-family: 'Outfit', sans-serif;
        }
    </style>
</head>

<body>
    <div id="suite-impulso-root"></div>
    <div id="debug-info"
        style="position:fixed;bottom:0;right:0;background:rgba(0,0,0,0.5);color:#fff;font-size:10px;padding:2px 5px;z-index:9999;opacity:0.6;pointer-events:none;">
    </div>

    <script type="text/babel">
        // Global error handler
        window.onerror = function (msg, url, line, col, error) {
            console.error("Dashboard Error:", msg, error);
            const root = document.getElementById('suite-impulso-root');
            if (root) {
                root.innerHTML = `
                    <div style="padding: 2rem; color: #721c24; background: #f8d7da; border: 1px solid #f5c6cb; border-radius: 8px; margin: 2rem; font-family: sans-serif;">
                        <h3 style="margin-top:0">Error de Ejecución (Bioever)</h3>
                        <p>${msg}</p>
                        <p style="font-size: 0.8rem; opacity: 0.8;">Línea: ${line}, Col: ${col}</p>
                        <button onclick="location.reload()" style="margin-top: 1rem; background: #721c24; color: #fff; padding: 0.5rem 1rem; border-radius: 4px; cursor: pointer; border:none;">Reintentar</button>
                    </div>
                `;
            }
            return false;
        };

        if (document.getElementById('debug-info')) {
            document.getElementById('debug-info').innerText = `R:${!!window.React} RD:${!!window.ReactDOM} L:${!!window.LucideReact} M:${!!window.Motion}`;
        }

        const { useState, useEffect } = React;
        const Lucide = window.LucideReact || window.lucide || {};
        const Motion = window.Motion || window.framerMotion || {
            motion: { div: (props) => <div {...props}>{props.children}</div> },
            AnimatePresence: ({ children }) => children
        };

        const SafeIcon = ({ icon: Icon, ...props }) => {
            const Component = Icon;
            if (!Component || (typeof Component !== 'function' && typeof Component !== 'object')) {
                return <div style={{ width: props.size || 20, height: props.size || 20, background: 'rgba(0,0,0,0.05)', borderRadius: '4px', display: 'inline-block' }} />;
            }
            return <Component {...props} />;
        };

        const {
            BarChart3, Files, Settings, Calendar, Lightbulb,
            ClipboardList, Target, Microscope, ExternalLink,
            Briefcase, Star, Users, ChevronDown, ChevronUp,
            CheckCircle2, Circle, PlayCircle, Save, Edit3,
            CheckSquare, Square, Loader2, Plus, Trash2, AlertCircle
        } = Lucide;

        const INITIAL_DATA = {
            header: {
                client: "Bioever",
                consultant: "Suite Impulso",
                startDate: "04 Marzo 2026",
                duration: "12 Meses",
                currentPhase: "Diagnóstico Biológico"
            },
            diagnosis: {
                situation: "Empresa de biotecnología con necesidad de digitalización de procesos.",
                problem: "Seguimiento manual de experimentos y resultados.",
                opportunity: "Automatización del flujo de datos mediante la Suite.",
                objective: "Reducir en un 40% el tiempo de reporte semanal.",
                strategy: "Implementación de tableros de control biológico personalizados."
            },
            methodStep: 1,
            weeklyTasks: [
                { text: "Auditoría de activos digitales", status: "completed" },
                { text: "Entrevista con responsables de laboratorio", status: "in-progress" },
                { text: "Definición de KPIs biológicos", status: "pending" }
            ],
            ongoingActions: [
                { text: "Configuración inicial del entorno", status: "in-progress" }
            ],
            calendar: [
                { date: "2026-03-10", type: "Reunión", title: "Presentación Fase 1", description: "Revisión de hallazgos iniciales." }
            ],
            decisions: [],
            learnings: [],
            growthLabActive: false,
            experiments: []
        };

        // --- COMPONENTS --- (Same as original)
        const Section = ({ title, icon: Icon, children, defaultOpen = true }) => {
            const [isOpen, setIsOpen] = useState(defaultOpen);
            return (
                <div className="section-card">
                    <div className="section-header" onClick={() => setIsOpen(!isOpen)}>
                        <div style={{ display: 'flex', alignItems: 'center', gap: '0.75rem' }}>
                            <SafeIcon icon={Icon} size={20} style={{ color: 'var(--primary)' }} />
                            <h2 style={{ fontSize: '1.25rem', margin: 0 }}>{title}</h2>
                        </div>
                        <button style={{ color: 'var(--text-muted)' }}>
                            <SafeIcon icon={isOpen ? ChevronUp : ChevronDown} size={20} />
                        </button>
                    </div>
                    <Motion.AnimatePresence>
                        {isOpen && (
                            <Motion.motion.div
                                initial={{ height: 0, opacity: 0 }}
                                animate={{ height: 'auto', opacity: 1 }}
                                exit={{ height: 0, opacity: 0 }}
                                transition={{ duration: 0.3 }}
                            >
                                <div className="section-content">{children}</div>
                            </Motion.motion.div>
                        )}
                    </Motion.AnimatePresence>
                </div>
            );
        };

        const ProgressBar = ({ currentStep }) => {
            const steps = ["Diagnóstico", "Posicionamiento", "Sistema de captación", "Producción de contenido", "Activación y alcance", "Optimización"];
            return (
                <div style={{ padding: '1rem 0' }}>
                    <div style={{ display: 'flex', justifyContent: 'space-between', position: 'relative', marginBottom: '2rem' }}>
                        <div style={{ position: 'absolute', top: '15px', left: '5%', right: '5%', height: '2px', background: 'var(--border-color)', zIndex: 0 }} />
                        {steps.map((step, index) => {
                            const stepNumber = index + 1;
                            const isCompleted = stepNumber < currentStep;
                            const isCurrent = stepNumber === currentStep;
                            return (
                                <div key={step} style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', zIndex: 1, width: '15%' }}>
                                    <div style={{
                                        width: '32px', height: '32px', borderRadius: '50%',
                                        background: isCompleted ? 'var(--success)' : isCurrent ? 'var(--primary)' : 'var(--bg-main)',
                                        border: `2px solid ${isCompleted ? 'var(--success)' : isCurrent ? 'var(--primary)' : 'var(--border-color)'}`,
                                        display: 'flex', alignItems: 'center', justifyContent: 'center',
                                        color: (isCompleted || isCurrent) ? '#fff' : 'var(--text-light)',
                                        marginBottom: '0.5rem'
                                    }}>
                                        {isCompleted ? <SafeIcon icon={CheckCircle2} size={18} /> : <span>{stepNumber}</span>}
                                    </div>
                                    <span style={{ fontSize: '0.75rem', textAlign: 'center', fontWeight: isCurrent ? '600' : '400', color: isCurrent ? 'var(--primary)' : 'var(--text-muted)' }}>{step}</span>
                                </div>
                            );
                        })}
                    </div>
                    <div style={{ background: 'var(--primary-light)', padding: '1rem', borderRadius: 'var(--radius-md)', borderLeft: '4px solid var(--primary)', display: 'flex', alignItems: 'center', gap: '0.75rem' }}>
                        <SafeIcon icon={PlayCircle} size={20} style={{ color: 'var(--primary)' }} />
                        <span><strong>Etapa actual:</strong> {steps[currentStep - 1]}</span>
                    </div>
                </div>
            );
        };

        const EditableField = ({ label, value, onSave, multiline = false }) => {
            const [isEditing, setIsEditing] = useState(false);
            const [currentValue, setCurrentValue] = useState(value);
            const handleSave = () => { onSave(currentValue); setIsEditing(false); };
            return (
                <div style={{ marginBottom: '1.25rem' }}>
                    <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '0.5rem' }}>
                        <label style={{ fontWeight: '600', fontSize: '0.9rem', color: 'var(--text-muted)' }}>{label}</label>
                        <button onClick={() => isEditing ? handleSave() : setIsEditing(true)} style={{ fontSize: '0.8rem', color: 'var(--primary)', display: 'flex', alignItems: 'center', gap: '0.25rem', padding: '2px 8px', borderRadius: '4px', background: 'var(--primary-light)' }}>
                            {isEditing ? <><SafeIcon icon={Save} size={14} /> Guardar</> : <><SafeIcon icon={Edit3} size={14} /> Editar</>}
                        </button>
                    </div>
                    {isEditing ? (
                        multiline ?
                            <textarea value={currentValue} onChange={(e) => setCurrentValue(e.target.value)} style={{ width: '100%', padding: '0.75rem', borderRadius: 'var(--radius-md)', border: '1px solid var(--primary)', minHeight: '100px', outline: 'none', fontFamily: 'inherit' }} /> :
                            <input type="text" value={currentValue} onChange={(e) => setCurrentValue(e.target.value)} style={{ width: '100%', padding: '0.75rem', borderRadius: 'var(--radius-md)', border: '1px solid var(--primary)', outline: 'none', fontFamily: 'inherit' }} />
                    ) : (
                        <div style={{ padding: '0.75rem', background: 'var(--bg-main)', borderRadius: 'var(--radius-md)', whiteSpace: 'pre-wrap', minHeight: '42px' }}>{currentValue || <em style={{ color: 'var(--text-light)' }}>Sin información...</em>}</div>
                    )}
                </div>
            );
        };

        const TaskChecklist = ({ tasks, onToggle, onAdd, onDelete, showAdd = true }) => {
            return (
                <div style={{ display: 'flex', flexDirection: 'column', gap: '0.75rem' }}>
                    {tasks.map((task, index) => (
                        <div key={index} style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', padding: '0.75rem', background: 'var(--bg-main)', borderRadius: 'var(--radius-md)', border: task.status === 'in-progress' ? '1px solid var(--primary)' : '1px solid transparent' }}>
                            <div style={{ display: 'flex', alignItems: 'center', gap: '0.75rem', cursor: 'pointer', flex: 1 }} onClick={() => onToggle(index)}>
                                {task.status === 'completed' ? <SafeIcon icon={CheckSquare} size={20} style={{ color: 'var(--success)' }} /> :
                                    task.status === 'in-progress' ? <SafeIcon icon={Loader2} size={20} className="animate-spin" style={{ color: 'var(--primary)' }} /> :
                                        <SafeIcon icon={Square} size={20} style={{ color: 'var(--text-light)' }} />}
                                <span style={{ textDecoration: task.status === 'completed' ? 'line-through' : 'none', color: task.status === 'completed' ? 'var(--text-light)' : 'var(--text-main)', fontWeight: task.status === 'in-progress' ? '600' : '400' }}>{task.text}</span>
                            </div>
                            {onDelete && <button onClick={(e) => { e.stopPropagation(); onDelete(index); }} style={{ color: 'var(--danger)', opacity: 0.6 }}><SafeIcon icon={Trash2} size={16} /></button>}
                        </div>
                    ))}
                    {showAdd && <button onClick={onAdd} style={{ display: 'flex', alignItems: 'center', gap: '0.5rem', color: 'var(--primary)', marginTop: '0.5rem', fontSize: '0.9rem', fontWeight: '500' }}><SafeIcon icon={Plus} size={18} /> Añadir tarea</button>}
                </div>
            );
        };

        const PublicationCalendar = ({ items }) => {
            return (
                <div style={{ display: 'flex', flexDirection: 'column', gap: '1rem' }}>
                    {items.length === 0 ? <div style={{ padding: '2rem', textAlign: 'center', color: 'var(--text-light)', border: '1px dashed var(--border-color)', borderRadius: 'var(--radius-md)' }}>No hay eventos programados.</div> :
                        items.map((item, index) => (
                            <div key={index} style={{ display: 'flex', gap: '1rem', padding: '1rem', borderLeft: '4px solid var(--success)', background: 'var(--bg-main)', borderRadius: '0 var(--radius-md) var(--radius-md) 0' }}>
                                <div style={{ minWidth: '60px', display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', background: '#fff', borderRadius: 'var(--radius-sm)', padding: '0.5rem', boxShadow: 'var(--shadow-sm)', height: 'fit-content' }}>
                                    <span style={{ fontSize: '0.7rem', fontWeight: 'bold', color: 'var(--text-light)', textTransform: 'uppercase' }}>{new Date(item.date).toLocaleDateString('es-ES', { month: 'short' })}</span>
                                    <span style={{ fontSize: '1.25rem', fontWeight: 'bold' }}>{new Date(item.date).getDate()}</span>
                                </div>
                                <div style={{ flex: 1 }}>
                                    <span style={{ fontSize: '0.8rem', color: 'var(--success)', fontWeight: 'bold' }}>{item.type}</span>
                                    <h4 style={{ fontSize: '1rem', marginBottom: '0.25rem' }}>{item.title}</h4>
                                    <p style={{ fontSize: '0.9rem', color: 'var(--text-muted)' }}>{item.description}</p>
                                </div>
                            </div>
                        ))
                    }
                </div>
            );
        };

        const GrowthLab = ({ experiments, isActive, onToggleActive, onAdd, onDelete, onUpdate }) => {
            if (!isActive) return (
                <div style={{ padding: '2.5rem', textAlign: 'center', background: 'var(--bg-main)', borderRadius: 'var(--radius-md)', border: '1px dashed var(--border-color)', display: 'flex', flexDirection: 'column', alignItems: 'center', gap: '1rem' }}>
                    <SafeIcon icon={AlertCircle} size={40} style={{ color: 'var(--text-light)' }} />
                    <h4 style={{ marginBottom: '0.5rem' }}>Módulo Growth No Activado</h4>
                    <p style={{ color: 'var(--text-muted)', fontSize: '0.9rem' }}>Este módulo forma parte del servicio de experimentación avanzada.</p>
                    <button onClick={onToggleActive} style={{ marginTop: '0.5rem', background: 'var(--primary)', color: '#fff', padding: '0.5rem 1rem', borderRadius: 'var(--radius-sm)' }}>Activar Módulo</button>
                </div>
            );
            return (
                <div style={{ overflowX: 'auto' }}>
                    <table style={{ width: '100%', borderCollapse: 'collapse', textAlign: 'left', minWidth: '600px' }}>
                        <thead>
                            <tr style={{ borderBottom: '2px solid var(--border-color)' }}>
                                <th style={{ padding: '1rem', fontSize: '0.9rem', color: 'var(--text-muted)' }}>Hipótesis</th>
                                <th style={{ padding: '1rem', fontSize: '0.9rem', color: 'var(--text-muted)' }}>Experimento</th>
                                <th style={{ padding: '1rem', fontSize: '0.9rem', color: 'var(--text-muted)' }}>Resultado</th>
                                <th style={{ padding: '1rem', fontSize: '0.9rem', color: 'var(--text-muted)' }}>Aprendizaje</th>
                                <th style={{ padding: '1rem', width: '50px' }}></th>
                            </tr>
                        </thead>
                        <tbody>
                            {experiments.map((exp, index) => (
                                <tr key={index} style={{ borderBottom: '1px solid var(--border-color)' }}>
                                    <td style={{ padding: '1rem' }}><textarea value={exp.hypothesis} onChange={(e) => onUpdate(index, 'hypothesis', e.target.value)} style={{ width: '100%', border: 'none', background: 'transparent', resize: 'none', outline: 'none', height: '60px', fontFamily: 'inherit' }} /></td>
                                    <td style={{ padding: '1rem' }}><textarea value={exp.experiment} onChange={(e) => onUpdate(index, 'experiment', e.target.value)} style={{ width: '100%', border: 'none', background: 'transparent', resize: 'none', outline: 'none', height: '60px', fontFamily: 'inherit' }} /></td>
                                    <td style={{ padding: '1rem' }}><textarea value={exp.result} onChange={(e) => onUpdate(index, 'result', e.target.value)} style={{ width: '100%', border: 'none', background: 'transparent', resize: 'none', outline: 'none', height: '60px', fontFamily: 'inherit' }} /></td>
                                    <td style={{ padding: '1rem' }}><textarea value={exp.learning} onChange={(e) => onUpdate(index, 'learning', e.target.value)} style={{ width: '100%', border: 'none', background: 'transparent', resize: 'none', outline: 'none', height: '60px', fontFamily: 'inherit' }} /></td>
                                    <td style={{ padding: '1rem' }}><button onClick={() => onDelete(index)} style={{ color: 'var(--danger)', opacity: 0.6 }}><SafeIcon icon={Trash2} size={16} /></button></td>
                                </tr>
                            ))}
                        </tbody>
                    </table>
                    <button onClick={onAdd} style={{ marginTop: '1.5rem', display: 'flex', alignItems: 'center', gap: '0.5rem', color: 'var(--primary)', fontSize: '0.9rem', fontWeight: '500' }}><SafeIcon icon={Plus} size={18} /> Nueva hipótesis</button>
                </div>
            );
        };

        function App() {
            const [data, setData] = useState(() => {
                const saved = localStorage.getItem('suite-impulso-data-bioever');
                return saved ? JSON.parse(saved) : INITIAL_DATA;
            });

            useEffect(() => {
                localStorage.setItem('suite-impulso-data-bioever', JSON.stringify(data));
            }, [data]);

            const updateSection = (section, key, value) => {
                setData(prev => ({ ...prev, [section]: { ...prev[section], [key]: value } }));
            };

            const toggleTask = (listKey, index) => {
                const newList = [...data[listKey]];
                const cycle = ['pending', 'in-progress', 'completed'];
                newList[index].status = cycle[(cycle.indexOf(newList[index].status) + 1) % 3];
                setData({ ...data, [listKey]: newList });
            };

            const addItem = (listKey, label) => {
                const text = prompt(label);
                if (text) setData({ ...data, [listKey]: [...data[listKey], { text, status: 'pending' }] });
            };

            return (
                <div className="dashboard-container">
                    <header className="glass section-card" style={{ padding: '2rem', display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(200px, 1fr))', gap: '2rem', border: '1px solid rgba(255,255,255,0.8)' }}>
                        <div>
                            <div style={{ display: 'flex', alignItems: 'center', gap: '0.5rem', color: 'var(--primary)', fontWeight: 'bold' }}><SafeIcon icon={Star} size={20} fill="currentColor" /><span>SUITE IMPULSO x BIOEVER</span></div>
                            <h1 style={{ fontSize: '1.75rem' }}>Dashboard Bioevner</h1>
                            <p style={{ color: 'var(--text-muted)', fontSize: '0.9rem' }}>Seguimiento estratégico y progreso biológico.</p>
                        </div>
                        <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '1rem' }}>
                            <div><label style={{ fontSize: '0.7rem', color: 'var(--text-light)', fontWeight: 'bold' }}>CLIENTE</label><p style={{ fontWeight: '600' }}>{data.header.client}</p></div>
                            <div><label style={{ fontSize: '0.7rem', color: 'var(--text-light)', fontWeight: 'bold' }}>FASE ACTUAL</label><p style={{ color: 'var(--primary)', fontWeight: 'bold' }}>{data.header.currentPhase}</p></div>
                            <div><label style={{ fontSize: '0.7rem', color: 'var(--text-light)', fontWeight: 'bold' }}>INICIO</label><p>{data.header.startDate}</p></div>
                            <div><label style={{ fontSize: '0.7rem', color: 'var(--text-light)', fontWeight: 'bold' }}>DURACIÓN</label><p>{data.header.duration}</p></div>
                        </div>
                    </header>

                    <Section title="Diagnóstico Estratégico Bioever" icon={Target}>
                        <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(300px, 1fr))', gap: '1.5rem' }}>
                            <EditableField label="Situación actual" value={data.diagnosis.situation} onSave={(v) => updateSection('diagnosis', 'situation', v)} multiline />
                            <EditableField label="Problema detectado" value={data.diagnosis.problem} onSave={(v) => updateSection('diagnosis', 'problem', v)} multiline />
                            <EditableField label="Oportunidad" value={data.diagnosis.opportunity} onSave={(v) => updateSection('diagnosis', 'opportunity', v)} multiline />
                            <EditableField label="Objetivo" value={data.diagnosis.objective} onSave={(v) => updateSection('diagnosis', 'objective', v)} multiline />
                            <EditableField label="Estrategia" value={data.diagnosis.strategy} onSave={(v) => updateSection('diagnosis', 'strategy', v)} multiline />
                        </div>
                    </Section>

                    <Section title="Progreso del Método" icon={BarChart3}>
                        <ProgressBar currentStep={data.methodStep} />
                    </Section>

                    <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(300px, 1fr))', gap: '2rem' }}>
                        <Section title="Tareas de Laboratorio" icon={ClipboardList}>
                            <TaskChecklist tasks={data.weeklyTasks} onToggle={(i) => toggleTask('weeklyTasks', i)} onAdd={() => addItem('weeklyTasks', 'Nueva tarea:')} onDelete={(i) => setData({ ...data, weeklyTasks: data.weeklyTasks.filter((_, idx) => idx !== i) })} />
                        </Section>
                        <Section title="Acciones de Digitalización" icon={Briefcase}>
                            <TaskChecklist tasks={data.ongoingActions} onToggle={(i) => toggleTask('ongoingActions', i)} onAdd={() => addItem('ongoingActions', 'Nueva acción:')} onDelete={(i) => setData({ ...data, ongoingActions: data.ongoingActions.filter((_, idx) => idx !== i) })} />
                        </Section>
                    </div>

                    <Section title="Control de Calidad" icon={Calendar}><PublicationCalendar items={data.calendar} /></Section>

                    <footer style={{ textAlign: 'center', color: 'var(--text-light)', fontSize: '0.85rem', padding: '2rem 0', borderTop: '1px solid var(--border-color)' }}>Suite Impulso &copy; 2026 — Dashboard Bioever</footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('suite-impulso-root'));
        root.render(<App />);
    </script>
</body>

</html>
